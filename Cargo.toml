
[workspace]
members = [
    "serve",
    "packages/book/programs/*"
]

resolver = "2"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1

[toolchain]
channel = "1.89.0"
components = ["rustfmt","clippy"]
profile = "minimal"
